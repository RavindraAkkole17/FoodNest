
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoodNest Login</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#121212;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-container{
    width:420px;
    background:#1e1e1e;
    padding:40px;
    border-radius:20px;
    border:1px solid #2f2f2f;
    box-shadow:0 10px 30px rgba(255,107,53,0.15);
}

.logo{
    text-align:center;
    margin-bottom:30px;
}

.logo i{
    font-size:50px;
    color:#ff6b35;
}

.logo h1{
    color:white;
    margin-top:10px;
}

.logo p{
    color:#aaa;
    margin-top:5px;
}

.input-group{
    margin-bottom:20px;
}

.input-group label{
    display:block;
    color:#ddd;
    margin-bottom:8px;
}

.input-group input{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    border-radius:10px;
    background:#2b2b2b;
    color:white;
    border:1px solid #333;
}

.input-group input:focus{
    border-color:#ff6b35;
}

.login-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#ff6b35;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
}

.login-btn:hover{
    background:#ff7d4d;
}

.bottom-text{
    text-align:center;
    margin-top:20px;
    color:#aaa;
}

.bottom-text a{
    color:#ff6b35;
    text-decoration:none;
    font-weight:600;
}

</style>
</head>
<body>

<div class="login-container">

    <div class="logo">
        <i class="fas fa-utensils"></i>
        <h1>FoodNest</h1>
        <p>Welcome Back</p>
    </div>

    <form action="login" method="post">

        <div class="input-group">
            <label>Email</label>
            <input type="email" placeholder="Enter Email" name = "email">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Enter Password" name = "password">
        </div>

        <button class="login-btn" type ="submit">
            Login
        </button>

    </form>

    <div class="bottom-text">
        Don't have an account?
        <a href="register.html">Register</a>
    </div>

</div>

</body>
</html>
